name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run build

      # Custom domain + SPA fallback: GitHub Pages serves 404.html for
      # unknown paths, so deep links like /rooms/:id load the app.
      - run: |
          echo "flusk.org" > dist/flusk-frontend/browser/CNAME
          cp dist/flusk-frontend/browser/index.html dist/flusk-frontend/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/flusk-frontend/browser

      - id: deploy
        uses: actions/deploy-pages@v4
