<article class="channel-card">
  <div class="channel-card__media">
    <img
      class="channel-card__cover"
      [src]="coverUrl()"
      [alt]="name() + ' cover'"
    />
    <p class="channel-card__category">{{ category() }}</p>
  </div>

  <div class="channel-card__content">
    <h3 class="channel-card__name">{{ name() }}</h3>
    <p class="channel-card__description">{{ description() }}</p>
    <footer class="channel-card__footer">
      <span class="channel-card__viewers">{{ viewers() | viewers }}</span>
    </footer>
  </div>
</article>
